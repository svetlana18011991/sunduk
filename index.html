<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сундук с невидимыми кнопками</title>
<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: transparent;
        overflow: hidden;
    }

    /* Контейнер адаптируется под размер картинки */
    #game-container {
        position: relative;
        display: inline-block;
        width: 100%;
        max-width: 800px;
        /* Используем контейнерные запросы для идеального масштабирования шрифта */
        container-type: inline-size; 
    }

    .chest-img {
        display: block;
        width: 100%;
        height: auto;
    }

    #chest-open {
        display: none;
    }

    /* Общая зона замка, выставляется поверх картинки */
    #lock-zone {
        position: absolute;
        /* Эти проценты двигают всю зону с цифрами. Меняй их, если цифры не попадут в пазы */
        top: 61%; 
        left: 27%; 
        width: 46%; 
        height: 18%;
        
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Отдельный слот для каждой цифры */
    .slot {
        position: relative;
        width: 20%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Внешний вид самой цифры. Фон перекрывает нарисованные нули */
    .digit {
        background-color: #3a2517; /* Цвет фона под цифрой (подбирал под темное дерево) */
        color: #ebd1a9; /* Цвет самой цифры */
        font-family: 'Courier New', monospace;
        font-weight: bold;
        font-size: 5cqw; /* Размер шрифта подстраивается под ширину сундука */
        text-align: center;
        width: 90%;
        padding: 5% 0;
        border-radius: 4px;
        box-shadow: inset 0px 2px 5px rgba(0,0,0,0.8);
        user-select: none;
        transition: transform 0.1s;
    }

    /* Прозрачные невидимые кнопки поверх нарисованных стрелок */
    .btn-invisible {
        position: absolute;
        width: 100%;
        height: 50%; /* Высота кликабельной зоны над и под цифрой */
        background: transparent;
        border: none;
        cursor: pointer;
        z-index: 10;
        outline: none;
    }

    /* Позиционирование прозрачных кнопок */
    .btn-up { top: -45%; }
    .btn-down { bottom: -45%; }

</style>
</head>
<body>

<div id="game-container">
    <img id="chest-closed" class="chest-img" src="https://ai-image.genially.com/6633c59920efa00014da5839/6a1a9567e6f7f2fdd097c408/6a1ab73c52dc8f7cac349daf.png" alt="Закрытый сундук">
    
    <img id="chest-open" class="chest-img" src="https://ai-image.genially.com/6633c59920efa00014da5839/6a1a9567e6f7f2fdd097c408/6a1ab745d830ade7d82a7a69.png" alt="Открытый сундук">

    <div id="lock-zone">
        <div class="slot">
            <button class="btn-invisible btn-up" onclick="changeDigit(0, 1)"></button>
            <div class="digit" id="num-0">0</div>
            <button class="btn-invisible btn-down" onclick="changeDigit(0, -1)"></button>
        </div>
        <div class="slot">
            <button class="btn-invisible btn-up" onclick="changeDigit(1, 1)"></button>
            <div class="digit" id="num-1">0</div>
            <button class="btn-invisible btn-down" onclick="changeDigit(1, -1)"></button>
        </div>
        <div class="slot">
            <button class="btn-invisible btn-up" onclick="changeDigit(2, 1)"></button>
            <div class="digit" id="num-2">0</div>
            <button class="btn-invisible btn-down" onclick="changeDigit(2, -1)"></button>
        </div>
        <div class="slot">
            <button class="btn-invisible btn-up" onclick="changeDigit(3, 1)"></button>
            <div class="digit" id="num-3">0</div>
            <button class="btn-invisible btn-down" onclick="changeDigit(3, -1)"></button>
        </div>
    </div>
</div>

<script>
    let code = [0, 0, 0, 0];
    const targetCode = [2, 4, 6, 7]; // Верный код

    function changeDigit(index, direction) {
        code[index] += direction;

        if (code[index] > 9) code[index] = 0;
        if (code[index] < 0) code[index] = 9;

        const digitElement = document.getElementById('num-' + index);
        digitElement.innerText = code[index];
        
        // Легкая анимация нажатия для отклика
        digitElement.style.transform = 'scale(0.9)';
        setTimeout(() => digitElement.style.transform = 'scale(1)', 100);

        checkCode();
    }

    function checkCode() {
        if (code.join('') === targetCode.join('')) {
            document.getElementById('chest-closed').style.display = 'none';
            document.getElementById('lock-zone').style.display = 'none';
            document.getElementById('chest-open').style.display = 'block';
        }
    }
</script>

</body>
</html>
